<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head(title)">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${title} + ' | Report Scheduler'">Report Scheduler</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.5.0/dist/tabler-icons.min.css"/>
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body>

<!-- ── SIDEBAR ────────────────────────────────────────────── -->
<aside th:fragment="sidebar(active)" class="sidebar">
    <div class="sidebar-brand">
        <div class="sidebar-brand-icon"><i class="ti ti-calendar-stats"></i></div>
        <div>
            <div class="sidebar-brand-name">Report Scheduler</div>
            <div class="sidebar-brand-sub">관리자 포털</div>
        </div>
    </div>

    <div class="nav-section">메인</div>
    <a th:href="@{/dashboard}" th:classappend="${active=='dashboard'} ? 'active'" class="nav-item">
        <i class="ti ti-layout-dashboard"></i>대시보드
    </a>

    <div class="nav-section">Job 관리</div>
    <a th:href="@{/jobs}" th:classappend="${active=='jobs'} ? 'active'" class="nav-item">
        <i class="ti ti-calendar-time"></i>Schedule Job
    </a>
    <a th:href="@{/reports}" th:classappend="${active=='reports'} ? 'active'" class="nav-item">
        <i class="ti ti-file-description"></i>Report
    </a>

    <div class="nav-section">사용자</div>
    <a th:href="@{/users/internal}" th:classappend="${active=='internal'} ? 'active'" class="nav-item">
        <i class="ti ti-users"></i>Internal User
    </a>
    <a th:href="@{/users/external}" th:classappend="${active=='external'} ? 'active'" class="nav-item">
        <i class="ti ti-building-community"></i>External User
    </a>
</aside>

<!-- ── TOP NAV ────────────────────────────────────────────── -->
<header th:fragment="topnav" class="topnav">
    <div class="topnav-left">
        <button class="menu-toggle" onclick="toggleSidebar()"><i class="ti ti-menu-2"></i></button>
    </div>
    <div class="topnav-right">
        <span class="topnav-time" id="live-clock"></span>
        <div class="topnav-divider"></div>
        <div class="admin-pill">
            <div class="av" sec:authentication="name">AD</div>
            <span sec:authentication="name">admin</span>
        </div>
        <a th:href="@{/logout}" class="logout-btn"><i class="ti ti-logout"></i>로그아웃</a>
    </div>
</header>

</body>
</html>
