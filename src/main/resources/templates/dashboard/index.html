<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="layout/layout :: head('대시보드')"></head>
<body class="app-body">

<aside th:replace="layout/layout :: sidebar('dashboard')"></aside>

<div class="main-wrap">
    <header th:replace="layout/layout :: topnav"></header>

    <main class="main">
        <div class="page-header">
            <div>
                <h1 class="page-title">대시보드</h1>
                <p class="page-sub"><span class="live-dot"></span>
                    <span id="today-label" th:text="${#dates.format(#dates.createNow(),'yyyy년 MM월 dd일')}"></span> 기준 실시간 현황
                </p>
            </div>
        </div>

        <!-- ── 지표 카드 ──────────────────────────────────── -->
        <div class="metric-grid">
            <div class="metric-card">
                <div class="metric-top">
                    <div class="metric-icon success"><i class="ti ti-circle-check"></i></div>
                    <span class="metric-trend">오늘</span>
                </div>
                <div class="metric-value success" th:text="${totalSuccess}">0</div>
                <div class="metric-label">성공</div>
            </div>
            <div class="metric-card">
                <div class="metric-top">
                    <div class="metric-icon danger"><i class="ti ti-alert-triangle"></i></div>
                    <span class="metric-trend">재전송 필요</span>
                </div>
                <div class="metric-value danger" id="fail-count" th:text="${totalFailed}">0</div>
                <div class="metric-label">실패</div>
            </div>
            <div class="metric-card">
                <div class="metric-top">
                    <div class="metric-icon warning"><i class="ti ti-clock-pause"></i></div>
                    <span class="metric-trend">ACTIVE Job</span>
                </div>
                <div class="metric-value warning" th:text="${totalPending}">0</div>
                <div class="metric-label">실행 대기</div>
            </div>
            <div class="metric-card">
                <div class="metric-top">
                    <div class="metric-icon info"><i class="ti ti-send"></i></div>
                    <span class="metric-trend">이번 달</span>
                </div>
                <div class="metric-value" th:text="${totalSent}">0</div>
                <div class="metric-label">총 발송 수</div>
            </div>
        </div>

        <!-- ── 차트 + 예정 ────────────────────────────────── -->
        <div class="two-col">
            <div class="card">
                <div class="card-head">
                    <span class="card-title"><i class="ti ti-chart-bar"></i>일별 실행 현황 (최근 7일)</span>
                </div>
                <div class="card-body">
                    <canvas id="dailyChart" height="80"></canvas>
                </div>
            </div>
            <div class="card">
                <div class="card-head">
                    <span class="card-title"><i class="ti ti-clock-hour-8"></i>ACTIVE Job 목록</span>
                    <a th:href="@{/jobs}" class="btn-sm"><i class="ti ti-external-link"></i>전체보기</a>
                </div>
                <div class="card-body" style="padding-top:4px">
                    <div th:each="job : ${upcomingJobs}" class="upcoming-item">
                        <span th:class="${job.status == 'ACTIVE'} ? 'upcoming-dot active' : 'upcoming-dot paused'"></span>
                        <span class="upcoming-name" th:text="${job.jobLabel}">Job명</span>
                        <span class="upcoming-badge" th:text="${job.outputFormats}">PDF</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- ── 실행 이력 테이블 ───────────────────────────── -->
        <div class="card">
            <div class="card-head">
                <span class="card-title"><i class="ti ti-list-details"></i>실행 이력</span>
                <div class="filter-row">
                    <select class="select-xs" onchange="location.href='/dashboard?status='+this.value">
                        <option value="" th:selected="${selectedStatus==null}">전체</option>
                        <option value="SUCCESS"    th:selected="${selectedStatus=='SUCCESS'}">성공</option>
                        <option value="FAILED"     th:selected="${selectedStatus=='FAILED'}">실패</option>
                        <option value="EMPTY_SKIP" th:selected="${selectedStatus=='EMPTY_SKIP'}">빈 레포트</option>
                    </select>
                    <button class="btn-sm" onclick="location.reload()"><i class="ti ti-refresh"></i>새로고침</button>
                </div>
            </div>
            <div class="table-wrap">
                <table>
                    <thead>
                    <tr>
                        <th>Job 이름</th>
                        <th>레포트</th>
                        <th>실행 시각</th>
                        <th>구분</th>
                        <th>상태</th>
                        <th>발송</th>
                        <th>오류 내용</th>
                        <th style="text-align:center">재전송</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="exec : ${executions}" class="data-row">
                        <td class="fw-500" th:text="${exec.jobLabel}">-</td>
                        <td class="text-sm text-secondary" th:text="${exec.reportName}">-</td>
                        <td class="text-sm text-secondary"
                            th:text="${#temporals.format(exec.jasperFireTime,'yyyy-MM-dd HH:mm')}">-</td>
                        <td>
                            <span th:if="${exec.triggeredBy == 'MANUAL'}" class="badge badge-info">수동</span>
                            <span th:unless="${exec.triggeredBy == 'MANUAL'}" class="badge badge-gray">스케줄</span>
                        </td>
                        <td>
                            <span th:if="${exec.executionStatus == 'SUCCESS'}"    class="badge badge-success"><i class="ti ti-check"></i>성공</span>
                            <span th:if="${exec.executionStatus == 'FAILED'}"     class="badge badge-danger"><i class="ti ti-x"></i>실패</span>
                            <span th:if="${exec.executionStatus == 'EMPTY_SKIP'}" class="badge badge-warning"><i class="ti ti-minus"></i>빈 레포트</span>
                        </td>
                        <td class="text-center" th:text="${exec.sentCount > 0} ? ${exec.sentCount}+'명' : '-'">-</td>
                        <td><span class="err-text" th:title="${exec.errorMessage}" th:text="${exec.errorMessage ?: '-'}">-</span></td>
                        <td class="text-center">
                            <button th:if="${exec.executionStatus == 'FAILED'}"
                                    class="btn-retry"
                                    th:attr="data-id=${exec.executionId}, data-label=${exec.jobLabel}"
                                    onclick="retryJob(this)">
                                <i class="ti ti-send"></i>재전송
                            </button>
                            <span th:unless="${exec.executionStatus == 'FAILED'}" class="text-tertiary text-sm">-</span>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(executions)}">
                        <td colspan="8" class="empty-row">실행 이력이 없습니다.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<div class="toast" id="toast"><i class="ti ti-check"></i><span id="toast-msg"></span></div>

<!-- Daily chart data -->
<script th:inline="javascript">
    const dailyStats = /*[[${dailyStats}]]*/ [];
</script>
<script th:src="@{/js/main.js}"></script>
<script th:src="@{/js/dashboard.js}"></script>
</body>
</html>
