<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="layout/layout :: head('Internal User')"></head>
<body class="app-body">
<aside th:replace="layout/layout :: sidebar('internal')"></aside>
<div class="main-wrap">
    <header th:replace="layout/layout :: topnav"></header>
    <main class="main">
        <div class="page-header">
            <div>
                <h1 class="page-title">Internal User</h1>
                <p class="page-sub">내부 이메일 수신자 관리 (한 사람이 여러 Company/Role을 가질 수 있습니다)</p>
            </div>
            <button class="btn btn-primary" onclick="openCreate()">
                <i class="ti ti-plus"></i>사용자 추가
            </button>
        </div>

        <div class="filter-bar">
            <input type="text" id="kw-company" placeholder="Company 코드" style="width:140px"/>
            <input type="text" id="kw-role"    placeholder="Role" style="width:120px"/>
            <input type="text" id="kw-keyword" placeholder="이메일 검색" style="width:200px"/>
            <button class="btn" onclick="loadList()"><i class="ti ti-search"></i>검색</button>
            <button class="btn" onclick="clearFilter()"><i class="ti ti-x"></i>초기화</button>
        </div>

        <div class="card">
            <div class="table-wrap">
                <table>
                    <thead>
                    <tr>
                        <th>이메일</th>
                        <th>Company</th>
                        <th>Role</th>
                        <th>상태</th>
                        <th>등록일</th>
                        <th style="text-align:center">관리</th>
                    </tr>
                    </thead>
                    <tbody id="user-tbody">
                    <tr th:each="u : ${users}" class="data-row">
                        <td class="fw-500" th:text="${u.email}">-</td>
                        <td th:text="${u.company}">-</td>
                        <td><span class="badge badge-gray" th:text="${u.role}">-</span></td>
                        <td>
                            <span th:if="${u.active}"   class="badge badge-active">활성</span>
                            <span th:unless="${u.active}" class="badge badge-disabled">비활성</span>
                        </td>
                        <td class="text-sm text-secondary"
                            th:text="${#temporals.format(u.createdAt,'yyyy-MM-dd')}">-</td>
                        <td style="text-align:center;white-space:nowrap">
                            <button class="btn-sm"
                                    th:attr="onclick='openEdit(\''+${u.email}+'\',\''+${u.company}+'\',\''+${u.role}+'\')'">
                                <i class="ti ti-edit"></i>수정
                            </button>
                            <button class="btn-sm btn-danger"
                                    th:attr="onclick='deleteRow(\''+${u.email}+'\',\''+${u.company}+'\',\''+${u.role}+'\')'">
                                <i class="ti ti-trash"></i>삭제
                            </button>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(users)}">
                        <td colspan="6" class="empty-row">등록된 사용자가 없습니다.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<div id="modal-overlay" class="modal-overlay" style="display:none" onclick="closeModal(event)">
    <div class="modal">
        <div class="modal-head">
            <span id="modal-title">사용자 추가</span>
            <button class="modal-close" onclick="closeModalDirect()"><i class="ti ti-x"></i></button>
        </div>
        <div class="modal-body">
            <input type="hidden" id="f-orig-email"/>
            <input type="hidden" id="f-orig-company"/>
            <input type="hidden" id="f-orig-role"/>
            <div class="form-grid">
                <div class="form-group full">
                    <label>이메일 <span class="req">*</span></label>
                    <input type="email" id="f-email" placeholder="user@company.com"/>
                </div>
                <div class="form-group">
                    <label>Company <span class="req">*</span></label>
                    <input type="text" id="f-company" placeholder="C400"/>
                </div>
                <div class="form-group">
                    <label>Role <span class="req">*</span></label>
                    <input type="text" id="f-role" placeholder="BM"/>
                </div>
                <div class="form-group">
                    <label>상태</label>
                    <select id="f-active">
                        <option value="true">활성</option>
                        <option value="false">비활성</option>
                    </select>
                </div>
            </div>
            <p class="text-sm text-secondary" style="margin-top:10px">
                동일한 이메일에 다른 Company/Role 조합을 추가하면 같은 사람이 여러 권한을 갖게 됩니다.
            </p>
        </div>
        <div class="modal-footer">
            <button class="btn" onclick="closeModalDirect()">취소</button>
            <button class="btn btn-primary" onclick="saveUser()"><i class="ti ti-check"></i>저장</button>
        </div>
    </div>
</div>

<div class="toast" id="toast"><i class="ti ti-check"></i><span id="toast-msg"></span></div>
<script th:src="@{/js/main.js}"></script>
<script>
let editMode = false;

function openCreate() {
    editMode = false;
    document.getElementById('modal-title').textContent = '사용자 추가';
    document.getElementById('f-email').value = '';
    document.getElementById('f-email').disabled = false;
    document.getElementById('f-company').value = '';
    document.getElementById('f-role').value = '';
    document.getElementById('f-active').value = 'true';
    document.getElementById('modal-overlay').style.display = 'flex';
}

// 특정 (email, company, role) 행을 정확히 찾아서 모달에 채움
function openEdit(email, company, role) {
    editMode = true;
    fetch('/users/internal/' + encodeURIComponent(email))
        .then(r => r.json())
        .then(list => {
            const u = list.find(x => x.company === company && x.role === role) || list[0];
            document.getElementById('modal-title').textContent = '사용자 수정';
            document.getElementById('f-orig-email').value   = u.email;
            document.getElementById('f-orig-company').value = u.company;
            document.getElementById('f-orig-role').value    = u.role;
            document.getElementById('f-email').value   = u.email;
            document.getElementById('f-email').disabled = false;
            document.getElementById('f-company').value = u.company;
            document.getElementById('f-role').value    = u.role;
            document.getElementById('f-active').value  = String(u.active);
            document.getElementById('modal-overlay').style.display = 'flex';
        });
}

function saveUser() {
    const data = {
        email:    document.getElementById('f-email').value,
        company:  document.getElementById('f-company').value,
        role:     document.getElementById('f-role').value,
        active: document.getElementById('f-active').value === 'true'
    };

    if (editMode) {
        data.origEmail   = document.getElementById('f-orig-email').value;
        data.origCompany = document.getElementById('f-orig-company').value;
        data.origRole    = document.getElementById('f-orig-role').value;
        apiFetch('/users/internal/row', 'PUT', data).then(r => {
            if (r.success) { showToast(r.message); closeModalDirect(); setTimeout(()=>location.reload(),800); }
            else alert(r.message);
        });
    } else {
        apiFetch('/users/internal', 'POST', data).then(r => {
            if (r.success) { showToast(r.message); closeModalDirect(); setTimeout(()=>location.reload(),800); }
            else alert(r.message);
        });
    }
}

function deleteRow(email, company, role) {
    if (!confirm(email + ' (' + company + ' / ' + role + ') 을 삭제하시겠습니까?')) return;
    const params = new URLSearchParams({ email, company, role });
    fetch('/users/internal/row?' + params.toString(), { method: 'DELETE' })
        .then(r => r.json())
        .then(r => {
            if (r.success) { showToast(r.message); setTimeout(()=>location.reload(),800); }
            else alert(r.message);
        });
}

function loadList() {
    const p = new URLSearchParams();
    const c = document.getElementById('kw-company').value;
    const ro = document.getElementById('kw-role').value;
    const kw = document.getElementById('kw-keyword').value;
    if (c)  p.set('company', c);
    if (ro) p.set('role', ro);
    if (kw) p.set('keyword', kw);
    location.href = '/users/internal?' + p.toString();
}

function clearFilter() { location.href = '/users/internal'; }
</script>
</body>
</html>
