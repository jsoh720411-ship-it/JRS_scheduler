<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="layout/layout :: head('Report 등록')"></head>
<body class="app-body">
<aside th:replace="layout/layout :: sidebar('reports')"></aside>
<div class="main-wrap">
    <header th:replace="layout/layout :: topnav"></header>
    <main class="main">
        <div class="page-header">
            <div>
                <h1 class="page-title" th:text="${mode == 'create'} ? '레포트 추가' : '레포트 수정'">레포트 추가</h1>
                <p class="page-sub">Jasper 레포트 URI 및 파라미터 정의</p>
            </div>
            <a th:href="@{/reports}" class="btn"><i class="ti ti-arrow-left"></i>목록으로</a>
        </div>

        <div class="form-wrap">
            <!-- 기본 정보 -->
            <div class="card" style="margin-bottom:16px">
                <div class="card-head"><span class="card-title"><i class="ti ti-file-description"></i>기본 정보</span></div>
                <div class="card-body">
                    <input type="hidden" id="f-report-id" th:value="${report.reportId}"/>
                    <div class="form-grid">
                        <div class="form-group full">
                            <label>레포트명 <span class="req">*</span></label>
                            <input type="text" id="f-report-name" th:value="${report.reportName}" placeholder="월간 매출 리포트"/>
                        </div>
                        <div class="form-group full">
                            <label>Jasper Report URI <span class="req">*</span></label>
                            <input type="text" id="f-uri" th:value="${report.jasperReportUri}" placeholder="/reports/sales/monthly_sales"/>
                        </div>
                        <div class="form-group full">
                            <label>설명</label>
                            <textarea id="f-desc" rows="2" th:text="${report.description}" placeholder="레포트 설명"></textarea>
                        </div>
                        <div class="form-group">
                            <label>상태</label>
                            <select id="f-active">
                                <option value="true"  th:selected="${report.isActive}">활성</option>
                                <option value="false" th:selected="${!report.isActive}">비활성</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 파라미터 정의 -->
            <div class="card" style="margin-bottom:16px">
                <div class="card-head">
                    <span class="card-title"><i class="ti ti-variable"></i>파라미터 정의</span>
                    <button class="btn-sm" onclick="addParam()"><i class="ti ti-plus"></i>파라미터 추가</button>
                </div>
                <div class="card-body" style="padding:0">
                    <table class="recipient-table" id="param-table">
                        <thead>
                        <tr>
                            <th>파라미터명</th>
                            <th>타입</th>
                            <th>필수</th>
                            <th>기본값</th>
                            <th>순서</th>
                            <th></th>
                        </tr>
                        </thead>
                        <tbody id="param-tbody">
                        <tr th:each="p,i : ${report.params}" th:attr="data-idx=${i.index}">
                            <td><input type="text"   th:id="'pname-'+${i.index}" th:value="${p.paramName}"    placeholder="param_name" style="width:140px"/></td>
                            <td><select              th:id="'ptype-'+${i.index}">
                                <option value="STRING"  th:selected="${p.paramType=='STRING'}">STRING</option>
                                <option value="DATE"    th:selected="${p.paramType=='DATE'}">DATE</option>
                                <option value="NUMBER"  th:selected="${p.paramType=='NUMBER'}">NUMBER</option>
                                <option value="BOOLEAN" th:selected="${p.paramType=='BOOLEAN'}">BOOLEAN</option>
                            </select></td>
                            <td style="text-align:center"><input type="checkbox" th:id="'preq-'+${i.index}" th:checked="${p.isRequired}"/></td>
                            <td><input type="text"   th:id="'pdef-'+${i.index}" th:value="${p.defaultValue}"  placeholder="기본값" style="width:120px"/></td>
                            <td><input type="number" th:id="'pord-'+${i.index}" th:value="${p.displayOrder}"  style="width:60px"/></td>
                            <td><button class="btn-del" onclick="removeParam(this)"><i class="ti ti-x"></i></button></td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="form-actions">
                <button class="btn btn-primary" onclick="saveReport()"><i class="ti ti-check"></i>저장</button>
                <a th:href="@{/reports}" class="btn">취소</a>
            </div>
        </div>
    </main>
</div>
<div class="toast" id="toast"><i class="ti ti-check"></i><span id="toast-msg"></span></div>
<script th:src="@{/js/main.js}"></script>
<script th:inline="javascript">
    const MODE = /*[[${mode}]]*/ 'create';
    let paramIdx = /*[[${#lists.size(report.params ?: {})}]]*/ 0;

    function addParam() {
        const idx = paramIdx++;
        const tr = document.createElement('tr');
        tr.setAttribute('data-idx', idx);
        tr.innerHTML = `
            <td><input type="text"   id="pname-${idx}" placeholder="param_name" style="width:140px"/></td>
            <td><select id="ptype-${idx}">
                <option value="STRING">STRING</option>
                <option value="DATE">DATE</option>
                <option value="NUMBER">NUMBER</option>
                <option value="BOOLEAN">BOOLEAN</option>
            </select></td>
            <td style="text-align:center"><input type="checkbox" id="preq-${idx}"/></td>
            <td><input type="text"   id="pdef-${idx}" placeholder="기본값" style="width:120px"/></td>
            <td><input type="number" id="pord-${idx}" value="${idx}" style="width:60px"/></td>
            <td><button class="btn-del" onclick="removeParam(this)"><i class="ti ti-x"></i></button></td>`;
        document.getElementById('param-tbody').appendChild(tr);
    }

    function removeParam(btn) { btn.closest('tr').remove(); }

    function collectParams() {
        const rows = document.querySelectorAll('#param-tbody tr');
        const params = [];
        rows.forEach(tr => {
            const idx = tr.getAttribute('data-idx');
            params.push({
                paramName:    document.getElementById('pname-' + idx)?.value,
                paramType:    document.getElementById('ptype-' + idx)?.value,
                isRequired:   document.getElementById('preq-' + idx)?.checked || false,
                defaultValue: document.getElementById('pdef-' + idx)?.value,
                displayOrder: parseInt(document.getElementById('pord-' + idx)?.value) || 0
            });
        });
        return params;
    }

    function saveReport() {
        const reportId = document.getElementById('f-report-id').value;
        const data = {
            reportName:      document.getElementById('f-report-name').value,
            jasperReportUri: document.getElementById('f-uri').value,
            description:     document.getElementById('f-desc').value,
            isActive:        document.getElementById('f-active').value === 'true',
            params:          collectParams()
        };
        const url    = MODE === 'edit' ? '/reports/' + reportId : '/reports';
        const method = MODE === 'edit' ? 'PUT' : 'POST';
        apiFetch(url, method, data).then(r => {
            if (r.success) { showToast('저장되었습니다.'); setTimeout(()=>location.href='/reports', 800); }
            else alert(r.message);
        });
    }
</script>
</body>
</html>
